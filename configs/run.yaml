# Inference config for run.py
# Copy and edit paths for your environment.

input: data/test_images          # single image file or directory
output: output/crops

model_paths:
  - runs/detect/table_train/weights/best.pt

conf: 0.25
device: cuda:0                   # use cpu for local runs without GPU
prefer_bottom: true
bottom_weight: 0.3
include_subdirs: false
rotation_debug: false
verbose: true
show_progress: true

# Optional: run Qwen2.5-VL extraction on each crop after cropping
extraction:
  enabled: false
  model_id: Qwen/Qwen2.5-VL-7B-Instruct
  device: cuda
  max_new_tokens: 128
  flash_attention_2: false
  prompt_path: configs/prompts/document_extraction.txt
  glob_pattern: "*.crop.png"
  verbose: true
