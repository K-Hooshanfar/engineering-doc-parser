name: CI

on:
  pull_request:
    branches: [ main, dev ]
  push:
    branches: [ main, dev ]

permissions:
  contents: read
  pull-requests: write

jobs:
  quality-and-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.10", "3.11", "3.12" ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          # Only hash the main requirements file (avoid requirements-dev.txt)
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt', 'pyproject.toml', 'poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies (requirements.txt)
        # Only run if requirements.txt exists (ignore requirements-dev*.txt)
        if: hashFiles('requirements.txt') != ''
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Ensure toolchain is available even if not in requirements
          pip install black ruff pylint mypy bandit pytest pytest-cov

      - name: Install dependencies (pyproject)
        if: hashFiles('pyproject.toml') != '' && hashFiles('requirements.txt') == ''
        run: |
          python -m pip install --upgrade pip
          pip install -e . || true
          pip install black ruff pylint mypy bandit pytest pytest-cov

      - name: Show versions
        run: |
          python --version
          pip list

      - name: Black (check formatting)
        run: black --check .

      - name: Ruff (lint & import order)
        run: ruff check .

      - name: Determine pylint target
        id: pylint_target
        shell: bash
        run: |
          targets=""
          if [ -d "train" ]; then targets="$targets train"; fi
          if [ -d "rotation" ]; then targets="$targets rotation"; fi
          if [ -d "Inference" ]; then targets="$targets Inference"; fi
          if [ -f "pipeline.py" ]; then targets="$targets pipeline.py"; fi

          if [ -n "$targets" ]; then
            echo "target=$targets" >> "$GITHUB_OUTPUT"
          elif [ -d "src" ]; then
            echo "target=src" >> "$GITHUB_OUTPUT"
          else
            files=$(git ls-files '*.py' | tr '\n' ' ')
            echo "target=${files:-.}" >> "$GITHUB_OUTPUT"
          fi

      - name: Pylint (score ≥ 6.5)
        shell: bash
        run: |
          set -o pipefail
          target="${{ steps.pylint_target.outputs.target }}"
          echo "Running pylint on: $target"
          pylint $target | tee pylint_output.txt || true
          echo
          echo "Parsing pylint score..."
          python - <<'EOF'
          import re, pathlib, sys
          txt = pathlib.Path("pylint_output.txt").read_text(errors="ignore")
          m = re.search(r"rated at ([0-9]+(?:\.[0-9]+)?)/10", txt)
          score = float(m.group(1)) if m else 0.0
          print(f"Pylint score parsed: {score}/10")
          with open("pylint_summary.txt","w") as f:
              f.write(f"**Pylint Score:** {score}/10\n\n")
              f.write("✅ Pylint check passed (score ≥ 6.5)\n\n" if score >= 6.5 else "❌ Pylint check failed (score < 6.5)\n\n")
              issues=[ln.strip() for ln in txt.splitlines() if '.py:' in ln and any(k in ln.lower() for k in ('error','warning','convention','refactor'))]
              if issues:
                  f.write("**Key Issues:**\n")
                  for issue in issues[:10]:
                      f.write(f"- {issue}\n")
                  if len(issues) > 10:
                      f.write(f"- ... and {len(issues)-10} more issues\n")
              else:
                  f.write("**No major issues found!** 🎉\n")
          sys.exit(0 if score >= 6.5 else 1)
          EOF

      - name: Mypy (type checking)
        run: |
          args=""
          [ -d train ] && args="$args train"
          [ -d rotation ] && args="$args rotation"
          [ -d Inference ] && args="$args Inference"
          [ -f pipeline.py ] && args="$args pipeline.py"
          [ -z "$args" ] && args="."
          mypy $args

      - name: Bandit (security lint)
        run: |
          paths=""
          [ -d train ] && paths="$paths train"
          [ -d rotation ] && paths="$paths rotation"
          [ -d Inference ] && paths="$paths Inference"
          [ -f pipeline.py ] && paths="$paths pipeline.py"
          bandit -q -r ${paths:-.}

      - name: Pytest (coverage ≥ 85%)
        run: |
          export PYTHONPATH="${PYTHONPATH:+${PYTHONPATH}:}."
          cov_args=""
          if [ -d "train" ] && [ -d "rotation" ]; then
            cov_args="--cov=train --cov=rotation"
          elif [ -d "train" ]; then
            cov_args="--cov=train"
          elif [ -d "rotation" ]; then
            cov_args="--cov=rotation"
          elif [ -d "src" ]; then
            cov_args="--cov=src"
          else
            cov_args="--cov=."
          fi
          if [ -f "pipeline.py" ]; then
            cov_args="$cov_args --cov=pipeline"
          fi
          pytest $cov_args --cov-report=term-missing --cov-report=json --cov-fail-under=85 | tee pytest_output.txt

      - name: Generate coverage summary (always)
        if: always()
        run: |
          python - <<'EOF'
          import json, pathlib
          out = pathlib.Path("pytest_output.txt").read_text(errors="ignore") if pathlib.Path("pytest_output.txt").exists() else ""
          cov = json.load(open("coverage.json")) if pathlib.Path("coverage.json").exists() else None
          with open("coverage_summary.txt","w") as f:
              if "failed" in out.lower(): f.write("❌ **Tests Failed**\n\n")
              elif "passed" in out.lower(): f.write("✅ **All Tests Passed**\n\n")
              else: f.write("⚠️ **Test Status Unknown**\n\n")
              if cov:
                  total = cov.get("totals",{}).get("percent_covered",0)
                  f.write(f"**Coverage:** {total:.1f}%\n\n")
                  f.write(("✅" if total >= 85 else "❌") + (" Coverage check passed (≥ 85%)\n\n" if total >= 85 else " Coverage check failed (< 85%)\n\n"))
                  files = cov.get("files",{})
                  if files:
                      f.write("**Coverage by File:**\n| File | Coverage | Missing Lines |\n|------|----------|---------------|\n")
                      for p,d in sorted(files.items()):
                          pct = d.get("summary",{}).get("percent_covered",0)
                          miss = d.get("missing_lines",[])
                          miss_str = ", ".join(map(str,miss[:5])) or "None"
                          if len(miss) > 5: miss_str += f", ... +{len(miss)-5} more"
                          short = p.replace("train/","").replace("rotation/","").replace("src/","")
                          f.write(f"| `{short}` | {pct:.1f}% | {miss_str} |\n")
          EOF

      - name: Comment PR with results
        if: always() && github.event_name == 'pull_request' && matrix.python-version == '3.12'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            let body = '## 🔍 Code Quality Report\n\n';
            try { body += '### Pylint Analysis\n' + fs.readFileSync('pylint_summary.txt','utf8') + '\n'; }
            catch { body += '### Pylint Analysis\n❓ Pylint summary not available\n\n'; }
            try { body += '### Test Coverage\n' + fs.readFileSync('coverage_summary.txt','utf8') + '\n'; }
            catch { body += '### Test Coverage\n❓ Coverage summary not available\n\n'; }
            body += '---\n*Report generated for Python ' + '${{ matrix.python-version }}' + '*';
            const comments = await github.rest.issues.listComments({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number });
            const existing = comments.data.find(c => c.user.login === 'github-actions[bot]' && c.body.includes('🔍 Code Quality Report'));
            if (existing) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
            }

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: |
            .coverage*
            htmlcov/
            coverage.json
            pylint_output.txt
            pylint_summary.txt
            coverage_summary.txt
            pytest_output.txt
