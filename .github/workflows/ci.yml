# .github/workflows/ci.yml
name: CI

on:
  pull_request:
    branches: [ main, dev ]

permissions:
  contents: read
  pull-requests: write

jobs:
  quality-and-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.10", "3.11", "3.12" ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/requirements*.txt', '**/pyproject.toml', '**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies (requirements.txt)
        if: hashFiles('requirements*.txt') != ''
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Ensure toolchain is available even if not in requirements
          pip install black ruff pylint mypy bandit pytest pytest-cov

      - name: Install dependencies (pyproject)
        if: hashFiles('pyproject.toml') != '' && hashFiles('requirements*.txt') == ''
        run: |
          python -m pip install --upgrade pip
          # Try to install the project (editable if possible)
          pip install -e . || true
          # Ensure toolchain
          pip install black ruff pylint mypy bandit pytest pytest-cov

      - name: Show versions
        run: |
          python --version
          pip list

      - name: Black (check formatting)
        run: black --check .

      - name: Ruff (lint & import order)
        run: ruff check .

      - name: Determine pylint target
        id: pylint_target
        shell: bash
        run: |
          # Check for your specific project structure
          targets=""
          if [ -d "train" ]; then
            targets="$targets train"
          fi
          if [ -d "rotation" ]; then
            targets="$targets rotation"
          fi
          
          if [ -n "$targets" ]; then
            echo "target=$targets" >> "$GITHUB_OUTPUT"
          elif [ -d "src" ]; then
            echo "target=src" >> "$GITHUB_OUTPUT"
          else
            # Fallback to tracked Python files at repo root
            files=$(git ls-files '*.py' | tr '\n' ' ')
            if [ -z "$files" ]; then
              echo "No Python files found; defaulting to '.'"
              echo "target=." >> "$GITHUB_OUTPUT"
            else
              echo "target=$files" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Pylint (score ≥ 6.5)
        shell: bash
        run: |
          set -o pipefail
          target="${{ steps.pylint_target.outputs.target }}"
          echo "Running pylint on: $target"
          # Run pylint; do not fail immediately—capture output for score parsing
          pylint $target | tee pylint_output.txt || true
          echo
          echo "Parsing pylint score..."
          python - <<'EOF'
          import re, sys, pathlib
          txt = pathlib.Path("pylint_output.txt").read_text(errors="ignore")
          m = re.search(r"rated at ([0-9]+(?:\.[0-9]+)?)/10", txt)
          score = float(m.group(1)) if m else 0.0
          print(f"Pylint score parsed: {score}/10")

          # Save pylint summary for PR comment
          with open("pylint_summary.txt", "w") as f:
              f.write(f"**Pylint Score:** {score}/10\n\n")
              if score >= 6.5:
                  f.write("✅ Pylint check passed (score ≥ 6.5)\n\n")
              else:
                  f.write("❌ Pylint check failed (score < 6.5)\n\n")

              # Extract key issues if any
              lines = txt.split('\n')
              issues = []
              for line in lines:
                  if '.py:' in line and ('error' in line.lower() or 'warning' in line.lower() or 'convention' in line.lower() or 'refactor' in line.lower()):
                      issues.append(line.strip())

              if issues:
                  f.write("**Key Issues:**\n")
                  for issue in issues[:10]:  # Limit to first 10 issues
                      f.write(f"- {issue}\n")
                  if len(issues) > 10:
                      f.write(f"- ... and {len(issues) - 10} more issues\n")
              else:
                  f.write("**No major issues found!** 🎉\n")

          sys.exit(0 if score >= 6.5 else 1)
          EOF

      - name: Mypy (type checking)
        run: |
          # Check your specific project structure
          if [ -d "train" ] && [ -d "rotation" ]; then
            mypy train rotation
          elif [ -d "train" ]; then
            mypy train
          elif [ -d "rotation" ]; then
            mypy rotation
          elif [ -d "src" ]; then
            mypy src
          else
            # Fallback: check repo root
            mypy .
          fi

      - name: Pytest (coverage ≥ 85%)
        run: |
          # Set PYTHONPATH to include project root for imports
          export PYTHONPATH="${PYTHONPATH:+${PYTHONPATH}:}."
          
          # Run pytest with coverage for your project structure
          if [ -d "train" ] && [ -d "rotation" ]; then
            pytest --cov=train --cov=rotation --cov-report=term-missing --cov-report=json --cov-fail-under=85 | tee pytest_output.txt || true
          elif [ -d "train" ]; then
            pytest --cov=train --cov-report=term-missing --cov-report=json --cov-fail-under=85 | tee pytest_output.txt || true
          elif [ -d "rotation" ]; then
            pytest --cov=rotation --cov-report=term-missing --cov-report=json --cov-fail-under=85 | tee pytest_output.txt || true
          elif [ -d "src" ]; then
            pytest --cov=src --cov-report=term-missing --cov-report=json --cov-fail-under=85 | tee pytest_output.txt || true
          else
            pytest --cov=. --cov-report=term-missing --cov-report=json --cov-fail-under=85 | tee pytest_output.txt || true
          fi

          # Generate coverage summary for PR comment
          python - <<'EOF'
          import json, sys, pathlib

          # Parse pytest output for test results
          pytest_output = ""
          if pathlib.Path("pytest_output.txt").exists():
              pytest_output = pathlib.Path("pytest_output.txt").read_text(errors="ignore")

          # Parse coverage JSON if available
          coverage_data = None
          if pathlib.Path("coverage.json").exists():
              with open("coverage.json") as f:
                  coverage_data = json.load(f)

          with open("coverage_summary.txt", "w") as f:
              # Extract test results
              test_passed = "passed" in pytest_output.lower()

              if "failed" in pytest_output.lower():
                  f.write("❌ **Tests Failed**\n\n")
              elif test_passed:
                  f.write("✅ **All Tests Passed**\n\n")
              else:
                  f.write("⚠️ **Test Status Unknown**\n\n")

              # Extract coverage percentage
              if coverage_data:
                  total_coverage = coverage_data.get("totals", {}).get("percent_covered", 0)
                  f.write(f"**Coverage:** {total_coverage:.1f}%\n\n")

                  if total_coverage >= 85:
                      f.write("✅ Coverage check passed (≥ 85%)\n\n")
                  else:
                      f.write("❌ Coverage check failed (< 85%)\n\n")

                  # Show file-by-file coverage
                  files_data = coverage_data.get("files", {})
                  if files_data:
                      f.write("**Coverage by File:**\n")
                      f.write("| File | Coverage | Missing Lines |\n")
                      f.write("|------|----------|---------------|\n")

                      for file_path, file_data in sorted(files_data.items()):
                          coverage_pct = file_data.get("summary", {}).get("percent_covered", 0)
                          missing_lines = file_data.get("missing_lines", [])
                          missing_str = ", ".join(map(str, missing_lines[:5]))  # Show first 5 missing lines
                          if len(missing_lines) > 5:
                              missing_str += f", ... +{len(missing_lines) - 5} more"

                          # Shorten file path for readability
                          short_path = file_path.replace("train/", "").replace("rotation/", "").replace("src/", "")
                          f.write(f"| `{short_path}` | {coverage_pct:.1f}% | {missing_str or 'None'} |\n")
              else:
                  # Fallback: parse from terminal output
                  lines = pytest_output.split('\n')
                  for line in lines:
                      if "TOTAL" in line and "%" in line:
                          # Extract percentage from TOTAL line
                          parts = line.split()
                          for part in parts:
                              if part.endswith('%'):
                                  coverage_pct = float(part.rstrip('%'))
                                  f.write(f"**Coverage:** {coverage_pct:.1f}%\n\n")
                                  if coverage_pct >= 85:
                                      f.write("✅ Coverage check passed (≥ 85%)\n\n")
                                  else:
                                      f.write("❌ Coverage check failed (< 85%)\n\n")
                                  break
                          break
          EOF

      - name: Comment PR with results
        if: github.event_name == 'pull_request' && matrix.python-version == '3.12'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            let commentBody = '## 🔍 Code Quality Report\n\n';

            // Add pylint results
            try {
              const pylintSummary = fs.readFileSync('pylint_summary.txt', 'utf8');
              commentBody += '### Pylint Analysis\n' + pylintSummary + '\n';
            } catch (error) {
              commentBody += '### Pylint Analysis\n❓ Pylint summary not available\n\n';
            }

            // Add coverage results
            try {
              const coverageSummary = fs.readFileSync('coverage_summary.txt', 'utf8');
              commentBody += '### Test Coverage\n' + coverageSummary + '\n';
            } catch (error) {
              commentBody += '### Test Coverage\n❓ Coverage summary not available\n\n';
            }

            commentBody += '---\n*Report generated for Python ' + '${{ matrix.python-version }}' + '*';

            // Find existing comment to update or create new one
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.data.find(comment =>
              comment.user.login === 'github-actions[bot]' &&
              comment.body.includes('🔍 Code Quality Report')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody
              });
            }

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: |
            .coverage*
            htmlcov/
            coverage.json
            pylint_output.txt
            pylint_summary.txt
            coverage_summary.txt
            pytest_output.txt