name: CI

on:
  pull_request:
    branches: [ main, dev ]
  push:
    branches: [ main, dev ]

permissions:
  contents: read
  pull-requests: write

jobs:
  quality-and-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.10", "3.11", "3.12" ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/requirements*.txt', '**/pyproject.toml', '**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies (requirements.txt)
        if: hashFiles('requirements*.txt') != ''
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Ensure toolchain is available even if not in requirements
          pip install black ruff pylint mypy bandit pytest pytest-cov

      - name: Install dependencies (pyproject)
        if: hashFiles('pyproject.toml') != '' && hashFiles('requirements*.txt') == ''
        run: |
          python -m pip install --upgrade pip
          # Try to install the project (editable if possible)
          pip install -e . || true
          # Ensure toolchain
          pip install black ruff pylint mypy bandit pytest pytest-cov

      - name: Show versions
        run: |
          python --version
          pip list

      - name: Black (check formatting)
        run: black --check .

      - name: Ruff (lint & import order)
        run: ruff check .

      - name: Determine pylint target
        id: pylint_target
        shell: bash
        run: |
          targets=""
          if [ -d "train" ]; then
            targets="$targets train"
          fi
          if [ -d "rotation" ]; then
            targets="$targets rotation"
          fi
          if [ -d "Inference" ]; then
            targets="$targets Inference"
          fi
          if [ -f "pipeline.py" ]; then
            targets="$targets pipeline.py"
          fi

          if [ -n "$targets" ]; then
            echo "target=$targets" >> "$GITHUB_OUTPUT"
          elif [ -d "src" ]; then
            echo "target=src" >> "$GITHUB_OUTPUT"
          else
            files=$(git ls-files '*.py' | tr '\n' ' ')
            echo "target=${files:-.}" >> "$GITHUB_OUTPUT"
          fi

      - name: Pylint (score ≥ 6.5)
        shell: bash
        run: |
          set -o pipefail
          target="${{ steps.pylint_target.outputs.target }}"
          echo "Running pylint on: $target"
          pylint $target | tee pylint_output.txt || true
          echo
          echo "Parsing pylint score..."
          python - <<'EOF'
          import re, sys, pathlib
          txt = pathlib.Path("pylint_output.txt").read_text(errors="ignore")
          m = re.search(r"rated at ([0-9]+(?:\.[0-9]+)?)/10", txt)
          score = float(m.group(1)) if m else 0.0
          print(f"Pylint score parsed: {score}/10")

          # Save pylint summary for PR comment
          with open("pylint_summary.txt", "w") as f:
              f.write(f"**Pylint Score:** {score}/10\n\n")
              if score >= 6.5:
                  f.write("✅ Pylint check passed (score ≥ 6.5)\n\n")
              else:
                  f.write("❌ Pylint check failed (score < 6.5)\n\n")

              # Extract key issues if any
              lines = txt.split('\n')
              issues = []
              for line in lines:
                  if '.py:' in line and ('error' in line.lower() or 'warning' in line.lower() or 'convention' in line.lower() or 'refactor' in line.lower()):
                      issues.append(line.strip())

              if issues:
                  f.write("**Key Issues:**\n")
                  for issue in issues[:10]:
                      f.write(f"- {issue}\n")
                  if len(issues) > 10:
                      f.write(f"- ... and {len(issues) - 10} more issues\n")
              else:
                  f.write("**No major issues found!** 🎉\n")

          sys.exit(0 if score >= 6.5 else 1)
          EOF

      - name: Mypy (type checking)
        run: |
          args=""
          [ -d train ] && args="$args train"
          [ -d rotation ] && args="$args rotation"
          [ -d Inference ] && args="$args Inference"
          [ -f pipeline.py ] && args="$args pipeline.py"
          [ -z "$args" ] && args="."
          mypy $args

      - name: Bandit (security lint)
        run: |
          paths=""
          [ -d train ] && paths="$paths train"
          [ -d rotation ] && paths="$paths rotation"
          [ -d Inference ] && paths="$paths Inference"
          [ -f pipeline.py ] && paths="$paths pipeline.py"
          bandit -q -r ${paths:-.}

      - name: Pytest (coverage ≥ 85%)
        run: |
          export PYTHONPATH="${PYTHONPATH:+${PYTHONPATH}:}."
          cov_args=""
          if [ -d "train" ] && [ -d "rotation" ]; then
            cov_args="--cov=train --cov=rotation"
          elif [ -d "train" ]; then
            cov_args="--cov=train"
          elif [ -d "rotation" ]; then
            cov_args="--cov=rotation"
          elif [ -d "src" ]; then
            cov_args="--cov=src"
          else
            cov_args="--cov=."
          fi
          if [ -f "pipeline.py" ]; then
            cov_args="$cov_args --cov=pipeline"
          fi

          # No '|| true' here: we want the step to fail on test/coverage failure
          pytest $cov_args --cov-report=term-missing --cov-report=json --cov-fail-under=85 | tee pytest_output.txt

      - name: Generate coverage summary (always)
        if: always()
        run: |
          python - <<'EOF'
          import json, sys, pathlib

          pytest_output = pathlib.Path("pytest_output.txt").read_text(errors="ignore") if pathlib.Path("pytest_output.txt").exists() else ""

          coverage_data = None
          if pathlib.Path("coverage.json").exists():
              with open("coverage.json") as f:
                  coverage_data = json.load(f)

          with open("coverage_summary.txt", "w") as f:
              if "failed" in pytest_output.lower():
                  f.write("❌ **Tests Failed**\n\n")
              elif "passed" in pytest_output.lower():
                  f.write("✅ **All Tests Passed**\n\n")
              else:
                  f.write("⚠️ **Test Status Unknown**\n\n")

              if coverage_data:
                  total = coverage_data.get("totals", {}).get("percent_covered", 0)
                  f.write(f"**Coverage:** {total:.1f}%\n\n")
                  f.write(("✅" if total >= 85 else "❌") + (" Coverage check passed (≥ 85%)\n\n" if total >= 85 else " Coverage check failed (< 85%)\n\n"))

                  files_data = coverage_data.get("files", {})
                  if files_data:
                      f.write("**Coverage by File:**\n")
                      f.write("| File | Coverage | Missing Lines |\n")
                      f.write("|------|----------|---------------|\n")
                      for file_path, file_data in sorted(files_data.items()):
                          pct = file_data.get("summary", {}).get("percent_covered", 0)
                          missing = file_data.get("missing_lines", [])
                          miss_str = ", ".join(map(str, missing[:5])) or "None"
                          if len(missing) > 5:
                              miss_str += f", ... +{len(missing)-5} more"
                          short = file_path.replace("train/", "").replace("rotation/", "").replace("src/", "")
                          f.write(f"| `{short}` | {pct:.1f}% | {miss_str} |\n")
              else:
                  # Fallback: try to parse from stdout
                  lines = pytest_output.splitlines()
                  for line in lines:
                      if "TOTAL" in line and "%" in line:
                          parts = line.split()
                          for part in parts:
                              if part.endswith('%'):
                                  pct = float(part.rstrip('%'))
                                  f.write(f"**Coverage:** {pct:.1f}%\n\n")
                                  f.write(("✅" if pct >= 85 else "❌") + (" Coverage check passed (≥ 85%)\n\n" if pct >= 85 else " Coverage check failed (< 85%)\n\n"))
                                  break
                          break
          EOF

      - name: Comment PR with results
        if: always() && github.event_name == 'pull_request' && matrix.python-version == '3.12'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            let commentBody = '## 🔍 Code Quality Report\n\n';

            try {
              const pylintSummary = fs.readFileSync('pylint_summary.txt', 'utf8');
              commentBody += '### Pylint Analysis\n' + pylintSummary + '\n';
            } catch {
              commentBody += '### Pylint Analysis\n❓ Pylint summary not available\n\n';
            }

            try {
              const coverageSummary = fs.readFileSync('coverage_summary.txt', 'utf8');
              commentBody += '### Test Coverage\n' + coverageSummary + '\n';
            } catch {
              commentBody += '### Test Coverage\n❓ Coverage summary not available\n\n';
            }

            commentBody += '---\n*Report generated for Python ' + '${{ matrix.python-version }}' + '*';

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.data.find(comment =>
              comment.user.login === 'github-actions[bot]' &&
              comment.body.includes('🔍 Code Quality Report')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody
              });
            }

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: |
            .coverage*
            htmlcov/
            coverage.json
            pylint_output.txt
            pylint_summary.txt
            coverage_summary.txt
            pytest_output.txt
